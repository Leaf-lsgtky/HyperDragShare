name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/hyperdragshare-release.keystore"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/hyperdragshare-release.keystore" >> "$GITHUB_ENV"

      - name: Verify and build APK
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest lintDebug assembleRelease

      - name: Locate signed release APK
        id: release_apk
        run: |
          mapfile -t apk_paths < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*-unsigned.apk')
          test "${#apk_paths[@]}" -eq 1
          echo "path=${apk_paths[0]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          "${{ steps.release_apk.outputs.path }}#HyperDragShare-${GITHUB_REF_NAME}.apk"
          --title "HyperDragShare ${GITHUB_REF_NAME}"
          --generate-notes
